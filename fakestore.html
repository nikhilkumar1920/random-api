<!DOCTYPE html>
<html>
<head>
    <title>Fake Store API</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <input type="number" id="productId" placeholder="Enter Product ID">
    <button onclick="getProduct()">Search</button>

    <br><br>

    <img id="productImg" width="200">
    <h3 id="productTitle"></h3>
    <p id="productPrice"></p>

    <script>
        async function getProduct() {
            try {
                const id = document.getElementById("productId").value;

                const response = await fetch(
                    `https://fakestoreapi.com/products/${id}`
                );

                if (!response.ok) {
                    throw new Error("Product not found");
                }

                const data = await response.json();

                document.getElementById("productImg").src = data.image;
                document.getElementById("productTitle").textContent = data.title;
                document.getElementById("productPrice").textContent =
                    "Price: $" + data.price;

            } catch (error) {
                alert(error.message);
            }
        }
    </script>

</body>
</html>
